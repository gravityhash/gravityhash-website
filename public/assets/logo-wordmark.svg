<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bladeGradW" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9ec1ff"/>
      <stop offset="45%" stop-color="#5b6cff"/>
      <stop offset="100%" stop-color="#2a2f8f"/>
    </linearGradient>
    <linearGradient id="hashGradW" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c9a6ff"/>
      <stop offset="55%" stop-color="#8a4dff"/>
      <stop offset="100%" stop-color="#3d1a8a"/>
    </linearGradient>
    <linearGradient id="hashTextGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="dividerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9ec1ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Mark -->
  <g transform="translate(20 10)">
    <path d="M 30 30 L 70 30 L 110 100 L 70 170 L 30 170 L 70 100 Z" fill="url(#bladeGradW)"/>
    <g transform="translate(96 70) rotate(35)">
      <rect x="0" y="0" width="58" height="16" rx="2" fill="url(#hashGradW)"/>
      <rect x="-10" y="28" width="58" height="16" rx="2" fill="url(#hashGradW)" opacity="0.95"/>
      <rect x="14" y="-22" width="14" height="78" rx="2" fill="url(#hashGradW)" opacity="0.85"/>
      <rect x="34" y="-22" width="14" height="78" rx="2" fill="url(#hashGradW)" opacity="0.75"/>
    </g>
  </g>

  <!-- Vertical divider -->
  <rect x="220" y="40" width="2" height="120" fill="url(#dividerGrad)"/>

  <!-- Wordmark -->
  <g font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="78" letter-spacing="6">
    <text x="250" y="128" fill="#ffffff">GRAVITY</text>
    <text x="608" y="128" fill="url(#hashTextGrad)">HASH</text>
  </g>
</svg>
