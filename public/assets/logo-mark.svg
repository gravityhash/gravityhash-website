<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bladeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9ec1ff"/>
      <stop offset="45%" stop-color="#5b6cff"/>
      <stop offset="100%" stop-color="#2a2f8f"/>
    </linearGradient>
    <linearGradient id="hashGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c9a6ff"/>
      <stop offset="55%" stop-color="#8a4dff"/>
      <stop offset="100%" stop-color="#3d1a8a"/>
    </linearGradient>
    <linearGradient id="edgeShine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Chevron "G" blade -->
  <path d="M 30 30 L 70 30 L 110 100 L 70 170 L 30 170 L 70 100 Z"
        fill="url(#bladeGrad)"/>
  <path d="M 30 30 L 70 30 L 70 36 L 36 36 Z" fill="url(#edgeShine)"/>

  <!-- Diagonal hash bars (offset, tilted) -->
  <g transform="translate(96 70) rotate(35)">
    <rect x="0" y="0" width="58" height="16" rx="2" fill="url(#hashGrad)"/>
    <rect x="-10" y="28" width="58" height="16" rx="2" fill="url(#hashGrad)" opacity="0.95"/>
    <rect x="14" y="-22" width="14" height="78" rx="2" fill="url(#hashGrad)" opacity="0.85"/>
    <rect x="34" y="-22" width="14" height="78" rx="2" fill="url(#hashGrad)" opacity="0.75"/>
  </g>
</svg>
